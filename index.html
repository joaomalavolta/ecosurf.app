<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A3A4C" />
    <meta name="description" content="Ecosurf — radar de surf colaborativo e cartografia socioambiental do litoral brasileiro." />
    <script>
      // Aplica o tema salvo antes da pintura (evita flash). Light é o padrão.
      try { if (localStorage.getItem('ecosurf:theme') === 'dark') document.documentElement.dataset.theme = 'dark' } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon_ecosurf.svg" />
    <link rel="apple-touch-icon" href="/atalho_icone_celular.png" />

    <!-- Compartilhamento (link no zap / redes) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ecosurf" />
    <meta property="og:title" content="Ecosurf — radar de surf e território" />
    <meta property="og:description" content="O mar de hoje, pela lente de quem está lá. Radar de surf colaborativo e cartografia socioambiental do litoral." />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
